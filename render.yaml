# Render.com Blueprint — AANP Website
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: aanp-apicultores-norte
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false   # Optional: set if you have a Facebook Page Access Token
      - key: FB_PAGE_ID
        value: apicultores.norte
